; Waveshare ESP32-S3-RLCD-4.2 (ESP32-S3-WROOM-1-N16R8)
; ST7305 400x300 mono reflective panel, PCF85063 RTC.
; Build:  pio run -e rlcd42
; Flash:  pio run -e rlcd42 -t upload
; Monitor: pio device monitor -b 115200

[platformio]
src_dir = main

[env:rlcd42]
platform = espressif32 @ 6.9.0  ; ESP-IDF 5.3.x (IDF 6 removed the core json component)
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200
board_upload.flash_size = 16MB
board_build.partitions = partitions.csv
; PSRAM (octal) and flash sizing are driven by sdkconfig.defaults.
